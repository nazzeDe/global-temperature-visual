<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>全球气温可视化</title>
        <link
            rel="stylesheet"
            href="{{ url_for('static', filename='css/style.css') }}"
        />
        <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    </head>
    <body>
        <div class="page">
            <h1>全球气温变化折线图</h1>

            <div class="toolbar">
                <label for="minYear">起始年份：</label>
                <input
                    id="minYear"
                    type="number"
                    value="1850"
                    min="1700"
                    max="2100"
                />
                <button id="reloadBtn">刷新</button>
            </div>

            <div id="globalTempChart" style="width: 100%; height: 520px"></div>
            <div id="msg" class="msg"></div>
        </div>

        <script src="{{ url_for('static', filename='js/global_temp_line.js') }}"></script>
    </body>
</html>
